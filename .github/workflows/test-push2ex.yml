name: test-push2ex-us-ip

on:
  workflow_dispatch:
    inputs:
      date:
        description: "测试用的交易日 (YYYYMMDD)，默认取最近一个交易日"
        required: false
        default: ""

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 确认 runner 公网 IP（验证美 IP）
        run: |
          echo "runner public IP: $(curl -sS -m 10 https://api.ipify.org || echo 'N/A')"
          echo "runner geo: $(curl -sS -m 10 https://ipinfo.io/json | head -c 200 || echo 'N/A')"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 akshare
        run: pip install akshare==1.18.64 tenacity

      - name: 测试 push2ex 封板池连通性
        run: |
          python - <<'PY'
          import sys, time, traceback
          try:
              import akshare as ak
          except Exception as e:
              print("IMPORT_FAIL:", e); sys.exit(1)

          date = "${{ github.event.inputs.date }}" or "20260710"
          print(f"TEST_DATE={date}")

          # push2ex 封板池
          for fn, label in [("stock_zt_pool_em","涨停池"), ("stock_zt_pool_dtgc_em","跌停池")]:
              t = time.time()
              try:
                  f = getattr(ak, fn)
                  df = f(date=date)
                  dt = time.time() - t
                  print(f"OK {label} ({fn}): rows={len(df)} elapsed={dt:.1f}s  head={df.head(1).to_dict('records')}")
              except Exception as e:
                  print(f"FAIL {label} ({fn}): {type(e).__name__}: {str(e)[:300]}")
                  traceback.print_exc()
          PY
