name: XXFI Daily

# 每个交易日 09:30 北京时间自动跑（01:30 UTC，周一至周五）
# 也可在 Actions 页面手动触发（workflow_dispatch）
on:
  schedule:
    - cron: "30 1 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 纯 akshare 取数 → 计算 → 生成 output/xxfi_report.md + .json
      # 默认 60 日波动率窗口（纯近期情绪相对冷热）；如需相对全年极端度改 --vol_window 260
      - name: Compute today's XXFI
        run: python run_xxfi.py --akshare --vol_window 60 --out output

      # 防污染：若数据日期 != 今天（休市/半日市，legu 返的是上一交易日），跳过写历史
      - name: Append to history (skip non-trading days)
        run: |
          python - <<'PY'
          import json, datetime
          r = json.load(open("output/xxfi_report.json", encoding="utf-8"))
          data_date = str(r.get("_data_date", ""))[:10]
          today = datetime.date.today().isoformat()
          if data_date != today:
              print(f"数据为 {data_date}，非当日（{today}），疑似休市，跳过写入历史")
              raise SystemExit(0)
          row = {
              "date": today,
              "xxfi": r["XXFI"],
              "greed": r["GreedIndex"],
              "signal": r["contrarian_signal"],
              "level": r["level"],
          }
          with open("output/history.jsonl", "a", encoding="utf-8") as f:
              f.write(json.dumps(row, ensure_ascii=False) + "\n")
          print("appended:", row)
          PY

      - name: Commit outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily XXFI update (${{ github.run_id }})"
          file_pattern: "output/*"
