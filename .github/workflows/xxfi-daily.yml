name: XXFI Daily

# 自动运行触发方案（盘后 · 仅交易日 · 单次）
# =====================================================================
# 设计依据 —— A股数据更新节奏（北京时间）：
#   09:30 开盘 → 15:00 收盘 → 15:00~16:00 指数日K / 涨跌家数 / 主力资金流向
#   陆续定稿 → 16:00+ 当日完整数据就绪。
#
# 三条约束的落地：
#   1) 交易日筛选：cron 仅覆盖周一至五；且 check 步骤用交易日历
#      (tool_trade_date_hist_sina) 精确排除法定节假日/休市日（含调休）。
#   2) 执行时机：cron "30 6 * * 1-5" = 北京 14:30。GitHub Actions 实际排队延迟约 2h
#      （实测 07-14/07-15 自动运行 ~+2h，07-13 拥堵日 +3h09m），实跑时间约 16:30 北京，
#      恰好盘后数据定稿窗口。cron 提前 2h 以对冲延迟，确保实跑落在 16:30 左右。
#   3) 每日频次：盘后单次。非交易日 / 数据未就绪 由 check 步骤 skip。
#
# 手动触发（workflow_dispatch，无参数）：
#   任意时间（含周末/非交易日）强制重算「最近一个交易日」的 XXFI。
#   取数全部走纯 akshare（legu 广度 + 新浪指数 + push2delay 资金流），
#   周末也能取到周五数据。历史趋势曲线由每日 cron 自动累积，无需手动回溯。
# =====================================================================
on:
  schedule:
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 交易日 & 盘后窗口判断：非交易日(节假日/周末) 或 盘中(<15:00北京时间) → trade=0
      # 注意：不再以「指数日K末根==今天」作为就绪信号——日K(stock_zh_index_daily)滞后约1天，
      # 收盘后许久不补当日 bar，会导致 check 永久失败。当日指数值改由 fetch_index 用
      # 新浪实时 spot 补充（见 fetch_market_akshare.fetch_index_spot），故此处只需判交易日+盘后。
      # 手动触发(workflow_dispatch) 不受 trade=0 限制，盘中也可出当日快照（用户已知并接受）。
      - name: 判断交易日与盘后窗口
        id: check
        run: |
          python - <<'PY'
          import akshare as ak, datetime, os
          BJ = datetime.timezone(datetime.timedelta(hours=8))
          now_bj = datetime.datetime.now(BJ)
          today = now_bj.strftime("%Y-%m-%d")
          cal = ak.tool_trade_date_hist_sina()
          is_trade = today in {str(x)[:10] for x in cal["trade_date"].tolist()}
          if not is_trade:
              print(f"{today} 非交易日（节假日/周末），跳过（手动触发仍可取最近交易日数据）")
              open(os.environ["GITHUB_OUTPUT"], "a").write("trade=0\n")
              raise SystemExit(0)
          if now_bj.hour < 15:
              print(f"{today} 盘中({now_bj.strftime('%H:%M')} 北京时间)，未收盘；自动任务跳过，手动触发可出盘中快照")
              open(os.environ["GITHUB_OUTPUT"], "a").write("trade=0\n")
              raise SystemExit(0)
          print(f"{today} 交易日且已收盘，执行 XXFI 计算")
          open(os.environ["GITHUB_OUTPUT"], "a").write("trade=1\n")
          PY

      # 纯 akshare 取数（legu 广度 + 新浪指数 + push2delay 资金流）→ 计算 → output/
      # 定时任务：仅交易日(trade=1)执行；手动触发：任意时间执行（取最近交易日）
      - name: Compute XXFI (akshare)
        if: steps.check.outputs.trade == '1' || github.event_name == 'workflow_dispatch'
        run: python run_xxfi.py --akshare --vol_window 60 --out output

      # 冰点参考（旁挂指标，不影响XXFI）：legu主→东财兜底→暂未获取
      # 与 XXFI 同一 check 闸门；独立产物 output/bingdian_report.json
      - name: Compute 冰点参考 (akshare)
        if: steps.check.outputs.trade == '1' || github.event_name == 'workflow_dispatch'
        run: python run_bingdian.py --akshare --out output

      # 写入历史趋势：仅当 data_date == 今天 且 已收盘(北京时间>=15:00)（避免盘中快照污染趋势）；
      # 同日已存在则跳过（防手动触发与 cron 重复追加）
      - name: Append to history (去重·仅收盘后)
        if: steps.check.outputs.trade == '1' || github.event_name == 'workflow_dispatch'
        run: |
          python - <<'PY'
          import json, datetime, os
          r = json.load(open("output/xxfi_report.json", encoding="utf-8"))
          data_date = str(r.get("_data_date", ""))[:10]
          BJ = datetime.timezone(datetime.timedelta(hours=8))
          now_bj = datetime.datetime.now(BJ)
          today = now_bj.strftime("%Y-%m-%d")
          if data_date != today:
              print(f"数据为 {data_date}，非当日（{today}），跳过写入历史（避免周末/非交易日污染）")
              raise SystemExit(0)
          if now_bj.hour < 15:
              print(f"盘中快照({now_bj.strftime('%H:%M')})，不写入历史趋势（避免盘中值污染）")
              raise SystemExit(0)
          hist_path = "output/history.jsonl"
          rows = []
          if os.path.exists(hist_path):
              with open(hist_path, encoding="utf-8") as f:
                  for line in f:
                      line = line.strip()
                      if line:
                          rows.append(json.loads(line))
          if any(row.get("date") == today for row in rows):
              print(f"{today} 已存在于历史，跳过追加（防重复）")
              raise SystemExit(0)
          row = {
              "date": today,
              "xxfi": r["XXFI"],
              "greed": r["GreedIndex"],
              "signal": r["contrarian_signal"],
              "level": r["level"],
          }
          with open(hist_path, "a", encoding="utf-8") as f:
              f.write(json.dumps(row, ensure_ascii=False) + "\n")
          print("appended:", row)
          PY

      # 渲染静态 HTML（XXFI + 冰点参考卡 → docs/index.html）
      - name: Render static HTML
        if: steps.check.outputs.trade == '1' || github.event_name == 'workflow_dispatch'
        run: python render_html.py --json output/xxfi_report.json --history output/history.jsonl --bingdian output/bingdian_report.json --out docs/index.html

      - name: Commit outputs
        if: steps.check.outputs.trade == '1' || github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily XXFI update (${{ github.run_id }})"
          file_pattern: "output/* docs/*"
